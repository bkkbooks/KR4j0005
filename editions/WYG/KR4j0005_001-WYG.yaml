body:
  text: 東坡詞宋蘇軾撰陽關曲中秋作夲名小秦王入腔卽陽關曲暮雲収盡溢清寒銀漢無聲轉玉盤此生此夜不長好明月明年何處看又軍中受降城下紫髯郎戲馬臺南舊戰場恨君不取契丹首金甲牙旗歸故鄉又李公擇舊刻重出濟南春好雪初晴纔到龍山馬足輕使君莫忘霅溪女時作陽關腸㫁聲如夢令元豐十年十二月十八日浴泗州雅熙墖下戲作如夢令闋此曲本唐莊宗製名憶仙姿嫌其名不雅故改為如夢令葢莊宗作此詞卒章云如夢如夢和淚出門相送因取以為名水垢何曾相受細看兩俱無有寄語揩背人盡日勞君揮肘輕手輕手居士夲來無垢又同前自淨方能洗彼我自汗流呀氣寄語澡浴人且共肉身遊戲但洗但洗俯為人間一切又有寄為向東坡傳語人在畫堂深處別後有誰來雪壓小橋無路歸去歸去江上一犂春雨又春思手種堂前桃李無限綠陰青子簾外百舌兒驚起五更春睡居士居士莫忘小橋流水又題淮山樓城上層樓疉巘城下清淮古汴舉手揖吳雲人與暮天俱遠魂㫁魂㫁後夜松江月滿生查子訴別三度別君來此別真遲暮白盡老髭鬚明日淮南去酒罷月隨人淚濕花如霧後夜逐君還夢繞湖邊路昭君怨送別誰作桓伊三弄驚破綠窗幽夢新月與愁煙滿江天欲去又還不去明日落花飛絮飛絮送行舟水東流點絳唇己已重九和蘇堅舊刻七首攷醉漾輕舟又月轉烏啼俱秦淮海作或云此二詞東坡有手迹流傳於世遂編入東坡詞然亦安知非秦詞蘇字耶今依宋夲刪去我輩情鍾古來誰似龍山宴而今楚甸戲馬餘飛觀顧謂佳人不覺秋強半簫聲遠鬢雲撩亂愁入參差雁又庚午重九再用前韻不用悲秋今年身健還高宴江村海甸總作空花觀尚想横汾蘭菊紛相半樓船逺白雲飛亂空有年年雁又再和送錢公永莫唱陽關風流公子方終宴秦山禹甸縹緲真竒觀北望平原落日山銜半孤㠶遠我歌君亂一送西飛雁又杭州閒倚胡床庾公樓外峰千朶與誰同坐明月清風我別椉一來有唱應須和還知麽自從添箇風月平分破又或刻賀方囘紅杏飄香柳含煙翠拖金縷水邊朱戸門掩黄昏雨燭影搖風一枕傷春緒歸不去鳳樓何處芳草迷歸路浣溪沙新秋舊刻四十五首攷風壓輕雲貼水飛是李後主作玉椀氷寒滴露華是晏同叔作俱删去舊逸晩菊花前斂翠蛾一首今増入風捲珠簾自上鈎蕭蕭亂葉報新秋獨攜纖手上高樓缺月向人舒窈窕三星當戸照綢繆香生霧縠見纖柔又遊蘄水清泉寺寺臨蘭溪溪水西流山下蘭芽短浸溪松間沙路淨無泥蕭蕭暮雨子規啼誰道人生無再少門前流水尚能西休將白髮唱黄雞又𤣥真子漁父云西塞山邊白鳥飛桃花流水鱖魚肥青蒻笠綠簑衣斜風細雨不須歸此語妙絶恨莫能歌者故増數語令以浣溪沙歌之或刻黄山谷西塞山邊白鷺飛散花洲外片㠶微桃花流水鱖魚肥自庇一身青篛笠相隨到處綠蓑衣斜風細雨不須歸又十一月二日雨後微雪太守徐君猷攜酒見過坐上作浣溪沙三首明日酒醒雪大作又作二首覆塊青青麥未蘇江南雲葉暗隨車臨臯烟景世間無雨脚半収簷㫁綫雪林初下瓦疎珠歸來氷顆亂黏鬚又前韻醉夢昏昏曉未蘇門前轆轆使君車扶頭一盞怎生無廢圃寒蔬挑翠羽小槽春酒凍真珠清香細細嚼梅鬚又前韻雪裏餐氊例姓蘇使君載酒為囘車天寒酒色轉頭無薦士已聞飛鶚表報恩應不用蛇珠醉中還許攬桓鬚又再和前韻半夜銀山上積蘇朝來九陌帶隨車濤江煙渚一時無空腹有詩衣有結溼薪如桂米如珠凍吟誰伴撚髭鬚又前韻萬頃風濤不記蘇雪晴江上麥千車但令人飽我愁無翠袖倚風縈柳絮絳脣得酒爛櫻珠尊前呵手鑷霜鬚又九月九日二首珠檜絲杉冷欲霜山城歌舞助凄涼且餐山色飲湖光共挽朱轓留半日強揉青蕋作重陽不知明日為誰黄又和前韻霜鬢真堪插拒霜哀絃危柱作伊涼暫時流轉為風光未遣清尊空北海莫因長笛賦山陽金釵玉腕瀉鵝黄又有感傅粉郎君又粉奴莫教施粉與施朱自然氷玉照香酥有客能為神女賦慿君送與雪兒書夢魂東去覓桑榆又詠橘菊暗荷枯一夜霜新苞綠葉照林光竹籬茆舍出青黄香霧噀人驚半破清泉流齒怯初嘗吳姬三日手猶香又公守湖辛未上元日作㑹於伽藍中時長老法惠在座人有獻剪伽花綵甚竒謂有初春興因作浣溪沙二首寄袁公濟雪頷霜髯不自驚更將剪綵發春榮羞顏未醉已先頳莫唱黄雞并白髪且呼張友喚殷兄有人歸去欲卿卿又和前韻料峭東風翠幕驚云何不飲對公榮水精盤瑩玉鱗頳花影莫辜三夜月朱顏未稱五年兄翰林子墨主人卿又徐門石潭謝雨道上作五首照日深紅㬉見魚連溪綠暗晩藏烏黄童白叟聚睢盱麋鹿逢人雖未慣猿猱聞鼓不須呼歸家説與採桑姑又旋抹紅妝看使君三三五五棘籬門相挨踏破蒨羅裙老幼扶攜収麥社烏鳶翔舞賽神村道逢醉叟臥黄昏又麻葉層層檾葉光誰家煑繭一村香隔籬嬌語絡絲娘垂白杖藜擡醉眼捋青搗麨軟飢腸問言豆葉幾時黄又蔌蔌衣巾落棗花村南村北響繰車牛衣古柳賣黄瓜酒困路長惟欲睡日高人渴謾思茶敲門試問野人家又軟草平莎過雨新輕沙走馬路無塵何時収拾耦畊身日㬉桑麻光似潑風來蒿艾氣如薰使君元是此中人又春情道字嬌訛苦未成未應春閣夢多情朝來何事綠鬟傾綵索身輕長趂燕紅窗睡重不聞鶯困人天氣近清明又菊節別元素縹緲危樓紫翠間良辰樂事苦難全感時懷舊獨凄然璧月瓊枝空夜夜菊花人貌自年年不知來歲與誰看又春情桃李溪邊駐畫輪鷓鴣聲裏倒清尊夕陽雖好近黄昏香在衣裳妝在臂水連芳草月連雲幾人歸去不銷魂又荷花四面垂楊十里荷問君何處最花多畫樓南畔夕陽和天氣乍涼人寂寞光陰須得酒消磨且來花裏聽笙歌又贈閭邱朝議時過徐州一别姑蘇已四年秋風南浦送歸船畫簾重見水中仙霜鬢不須催我老杏花依舊駐君顏夜闌相對夢魂間又有贈惟見眉間一點黄詔書催發羽書忙從教嬌淚洗紅妝上殿雲霄生羽翼論兵齒頰帶風霜歸來衫袖有天香又憶舊長記鳴琴子賤堂朱顏綠髪映垂楊如今秋鬢數莖霜聚散交遊如夢寐升沉閒事莫思量仲卿終不避桐鄉又紹聖元年十月十三日與程鄉令侯晉叔歸安簿譚汲遊大口寺野飲松下設松黄湯作此闋余近釀酒名萬家春蓋嶺南萬戸酒也羅襪空飛洛浦塵錦袍不見謫仙神攜壺藉草亦天真玉粉輕黄千歲藥雪花浮動萬家春醉歸江路野梅新又重九白雪清詞出坐間愛君才器兩俱全異鄉風景却依然可恨相逢能幾日不知重㑹是何年茱茰子細更重看又元豐七年十月二十四日從泗州劉倩叔遊南山細雨斜風作曉寒淡煙疎柳媚晴灘入淮清洛漸漫漫雪沫乳花浮午盞蓼芽蒿笋試春盤人間有味是清歡又送梅庭老赴潞州學官門外東風雪灑裾山頭囘首望三吳不應彈鋏為無魚上黨從來天下脊先生元是古之儒時平不用魯連書又徐州藏春閣園中慚愧今年二麥豐千畦翠浪舞晴空化工餘力染夭紅歸去三公應倒載闌街拍手笑兒童甚時名作錦薰籠又揚州賞芍藥櫻桃芍藥櫻桃兩鬬新名園高會送芳辰洛陽初夏廣陵春紅玉半開菩薩面丹砂穠點柳枝脣尊前還有箇中人又贈楚守田待制小鬟學畫鵶兒正妙年陽城下蔡困嫣然慿君莫唱短因緣霧帳吹笙香嫋嫋霜庭按舞月娟娟曲終紅袖落雙纏又和前韻一夢江湖費五年歸來風物故依然相從一醉是前緣遷客不應常眊矂使君為出小嬋娟翠鬟聊著小詩纒又端午輕汗微微透碧紈明朝端午浴芳蘭流香漲膩滿晴川綵線輕纒紅玉臂小符斜挂綠雲鬟佳人相見一千年又感舊徐邈能中酒聖賢劉伶席地幕青天潘郎白璧為誰連無可奈何新白髪不如歸去舊青山恨無人借買山錢又自適傾葢相逢勝白頭故山空復夢松楸此心安處是菟裘賣劒買牛真欲老乞漿得酒更何求願為辭社宴春秋又寓意和前韻炙手無人傍屋頭蕭蕭晩雨脱梧楸誰憐季子敝貂裘顧我已無當世望似君須向古人求歲寒松栢肯驚秋又即事畫隼横江喜再遊老魚跳檻識清謳流年未肯付東流黄菊籬邊無悵望白雲鄉裏有温柔挽囘霜鬢莫教休又方響花滿銀塘水漫流犀槌玉板奏涼州順風環珮過秦樓逺漢碧雲輕漠漠今宵人在鵲橋頭一聲敲徹絳河秋又端午闕袂輕風不破塵玉簪犀璧醉佳辰一番紅粉闕誰新團扇只堪題往事新絲那解繫行人酒闌滋味似殘春又幾共查梨到雪霜一經題品便生光木奴何處避雌黄北客有來初未識南金無價喜新嘗含滋嚼句齒牙香又山色横侵蘸暈霞湘川風静吐寒花遠林屋散闕啼鴉夢到故園多少路酒醒南望隔天涯月明千里照平沙又重陽舊刻逸晩菊花前歛翠蛾挼花傳酒緩聲歌柳枝團扇别離多擁髻凄涼論舊事㑹隨織女度銀梭當年今夕奈愁何減字木蘭花自錢塘被召林子中作郡守有㑹坐中營妓出牒鄭容求落籍高瑩求從良子中呈東坡東坡索筆為減字木蘭花書牒後時用鄭容落籍高瑩從良八字於句端也兼贈潤守許仲途鄭莊好客容我尊前先墮幘落筆生風籍籍聲名不負公高山白早瑩骨氷膚那解老從此南徐良夜清風月滿湖又寓意雲鬟傾倒醉倚闌干風月好慿仗相扶誤入仙家碧玉壺連天衰草不走湖南西去道一舸姑蘇便逐䲭夷去得無又荔枝閩溪珍獻過海雲㠶來似箭玉座金盤不貢竒葩四百年輕紅釀白雅稱佳人纖手擘骨細肌香恰是當年十八娘又送東武令趙晦之賢哉令尹三仕已之無喜愠我獨何人猶把虚名玷搢紳不如歸去二頃良田無覓處歸去來兮待有良田是幾時又送别玉觴無味中有佳人千點淚學道忘憂一念還成不自由如今未見歸去東園花似霰一語相開匹似當初本不來又送趙令春光亭下流水如今何在也歲月如梭白首相看擬奈何故人重見世事年來千萬變官况闌珊慚愧青松守歲寒又過吳興李公擇生子三日㑹客作此詞戲之惟熊佳夢釋氏老君㑹抱送壯氣横秋未滿三朝已食牛犀錢玉果利市平分沾四座多謝無功此事如何到得儂又得書曉來風細不㑹鵲聲來報喜却羨寒梅先覺春風一夜來香牋一紙寫盡囘紋機上意欲巻重開讀徧千囘與萬囘又送别天台舊路應恨劉郎來又去别酒頻傾忍聽陽關第四聲劉郎未老懷戀仙鄉重得到只恐因循不見如今勸酒人又錢塘西湖有詩僧清順居其上自名藏春塢門前有二古松各有凌霄花絡其上順常晝臥其下子瞻為郡一日屏騎從過之松風騷然順指落花覓句子瞻為賦此詞雙龍對起白甲蒼髯煙雨裏疎影微香下有幽人晝夢長湖風清軟雙鵲飛來爭噪晩翠􅀈紅輕時下凌霄百尺英又贈小鬟琵琶琵琶絶藝年記都來十一二撥弄么絃未解將心指下傳主人嗔小欲向東風先醉倒已屬君家且更從容等待他又立春春牛春杖無限春風來海上便與春工染得桃紅似肉紅春幡春勝一陣春風吹酒醒不似天涯捲起楊花似雪花又雪詞雪容皓白破曉玉英紛似織風力無端欲學楊花更耐寒相如未老梁苑猶能陪俊少莫惹閒愁且折江梅上小樓又玉房金蕋宜在玉人纖手裏淡月朦朧更有微微弄袖風溫香熟美醉慢雲鬟垂兩耳多謝春工不是花紅是玉紅又春月春庭月午搖蕩香醪光欲舞歩轉迴廊半落梅花婉娩香輕風薄霧總是少年行樂處不似秋光只與離人照㫁腸又贈勝之天然宅院賽了千千并萬萬説與賢知表德元來是勝之今來十四海裏猴兒奴子是要睹休癡六隻骰兒六點兒又琴神閒意定萬籟収聲天地静玉指氷絃未動宫商意已傳悲風流水寫出寥寥千古意歸去無眠一夜餘音在耳邊又銀箏旋品不用纒頭千尺錦妙思如泉一洗閒愁十五年為公少止起舞屬公公莫起風裏銀山擺撼魚龍我自閒又贈君猷家姬柔和性氣雅稱佳名呼懿懿解舞能謳絶妙年中有品流眉長眼細淡淡梳妝新綰髻懊惱風情春著花枝百態生又鶯初解語最是一年春好處微雨如酥草色遙看近却無休辭醉倒花不看開人易老莫待春囘顛倒紅英間綠苔又江南遊女問我何年歸得去雨細風微兩足如霜挽紵衣江亭夜語喜見京華新様舞蓮歩輕飛遷客今朝始是歸又贈徐君猷三侍人一嫵卿嬌多媚㬠體柳輕盈千萬態殢主尤賓歛黛含嚬喜又嗔徐君樂飲笑謔從伊情意恁臉嫩膚紅花倚朱闌裹住風又勝之雙鬟綠墜嬌眼横波眉黛翠妙舞蹁躚掌上身輕意態妍曲窮力困笑倚人㫄香喘噴老大逢歡昏眼猶能仔細㸔又慶姬天真雅麗容態溫柔心性慧響亮歌喉遏住行雲翠不収妙詞佳曲囀出新聲能㫁續重客多情滿勸金巵玉手擎訴衷情送述古迓元素錢塘風景古來竒太守例能詩先驅負弩何在心已浙江西花盡後葉飛時雨凄凄若為情緒更問新官向舊官啼又海棠或刻晏同叔海棠珠綴一重重清曉近簾櫳胭脂誰與勻淡偏向臉邊濃看葉嫩惜花紅意無窮如花似葉歲歲年年共占春風又琵琶女小蓮初上琵琶絃彈破碧雲天分明繡閣幽恨都向曲中傳膚瑩玉鬢梳蟬綺窗前素蛾今夜故故隨人似鬬嬋娟菩薩鬘歌妓繡簾高捲傾城出燈前㶑灧横波溢皓齒發清歌春山入翠蛾悽音休怨亂我已先偷玩梅蕚月窗虚纍纍一串珠又碧紗微露纖纖玉一曲雲和湘水綠越調變新聲龍吟徹骨清夜長殘酒醒頓覺霜袍冷不見意中人新啼壓舊痕又西湖秋風湖上蕭蕭雨使君欲去還留住今日謾留君明朝愁殺人尊前千點淚灑向長河水不用歛雙蛾路人啼更多又杭妓往蘇玉童西迓浮邱伯洞天冷落秋蕭瑟不用許飛瓊瑤臺空月明清香凝夜宴借與韋郎看莫便過姑蘇扁舟下五湖又闕文天憐豪俊原缺向松江滿缺景為淹留從君都占秋身閒惟缺遨遊首帝夢缺匆匆歸去時又代妓送陳述古娟娟缺月西南落相思撥㫁琵琶索枕淚夢魂中覺來眉暈重畫堂堆燭淚長笛吹新水醉客各西東應思陳孟公又感舊玉笙不受珠脣㬉離聲凄咽胸填滿遺恨幾千秋恩留人不留他年京國酒泫淚攀枯柳莫唱短因縁長安遠似天又新月畫簷初挂彎彎月孤光未滿先憂缺還認玉簾鈎天孫梳洗樓佳人言語好不願求新巧此恨固應知願人無别離又七夕風迴仙原缺開扇更闌月墜星河轉枕上夢魂驚曉簷疎雨零相逢雖草草長共天難老終不羨人間人間夜似年又有寄城隅静女何人見先生日夜歌彤管誰識蔡姬賢江南顧彦先先生那久困湯沐須名郡惟有謝夫人從來見擬倫又買田陽羨吾將老從來只為溪山好來往一虚舟聊隨物外遊有書仍懶著水調歌歸去筋力不辭詩要須風雨時又囘文落花閒院春衫薄薄衫春院閒花落遲日恨依依依依恨日遲夢囘鸎舌弄弄舌鸎囘夢郵便問人羞羞人問便郵又夏景囘文火雲凝汗揮珠顆顆珠揮汗凝雲火瓊㬉碧紗輕輕紗碧㬉瓊暈腮嫌枕印印枕嫌腮暈閒照晩妝殘殘妝晩照閒又囘文嶠南江淺紅梅小小梅紅淺江南嶠窺我向疎籬籬疎向我窺老人行即到到即行人老離别惜殘枝枝殘惜别離又囘文春閨怨翠鬟斜幔雲垂耳耳垂雲幔斜鬟翠春晩睡昏昏昏昏睡晩春細花梨雪墜墜雪梨花細顰淺念誰人人誰念淺顰又囘文夏閨怨柳庭風静人眠晝晝眠人静風庭柳香汗薄衫涼涼衫薄汗香手紅氷腕藕藕腕氷紅手郎笑藕絲長長絲藕笑郎又囘文秋閨怨井梧雙照新妝冷冷妝新照雙梧井羞對井花愁愁花井對羞影孤憐夜永永夜憐孤影樓上不宜愁愁宜不上樓又囘文冬閨怨雪花飛㬉融香頰頰香融㬉飛花雪欺雪任單衣衣單任雪欺别時梅子結結子梅時别歸不恨開遲遲開恨不歸又娟娟侵鬢妝痕淺雙顰相媚彎如剪一瞬百般宜無論笑與啼酒闌思翠被特故騰騰地生怕促歸輪微波先泥人又詠足塗香莫惜蓮承歩長愁羅襪凌波去只見舞迴風都無行處蹤偷穿宫様穩並立雙趺困纖妙説應難須從掌上看又玉鐶墜耳黄金飾輕衫罩體香羅碧緩歩困春醪春融臉上桃花鈿從委地誰與郎為意長愛月華清此時憎月明採桑子潤州東景樓與孫巨源相遇多情多感仍多病多景樓中樽酒相逢樂事囘頭一笑空停盃且聽琵琶語細撚輕攏醉臉春融斜照江天一抹紅卜算子感舊蜀客到江南長憶吳山好吳蜀風流自古同歸去應須早還與去年人共藉西湖草莫惜尊前仔細看應是容顏老又惠州有溫都監女頗有色年十六不肯嫁人聞坡至甚喜毎夜聞坡諷詠則徘徊窗下坡覺而推窗則其女踰牆而去坡從而物色之曰吾當呼王郎與之子為婣未幾而坡過海女遂卒𦵏於沙灘側坡囘惠為賦此詞缺月挂疎桐漏㫁人初靜時見幽人獨往來縹緲孤鴻影驚起却囘頭有恨無人省揀盡寒枝不肯棲寂寞沙洲冷一刻楓落吳江冷好事近送君猷紅粉莫悲啼俯仰半年離别看取雪堂坡下老農夫凄切明年春水漾桃花柳㟁隘舟楫從此滿城歌吹看黄州闐咽又元刻不載煙外倚危樓初見遠燈明滅却跨玉虹歸去看洞天星月當時張范風流在况一樽浮雪莫問世間何事與劎頭微吷又湖上湖上雨晴時秋水半篙初沒朱檻俯窺寒鑑照衰顏華髪醉中欲墮白綸巾溪風漾流月獨棹小舟歸去任煙波飄兀華清引感舊平時十月幸蓮湯玉甃瓊梁五家車馬如水珠璣滿路㫄翠華一去掩方床獨留煙樹蒼蒼至今清夜月依舊過繚牆謁金門秋夜秋帷裏長漏伴人無寐低玉枕涼輕繡被一番秋氣味曉色又侵窗紙窗外雞聲初起聲斷幾聲還到耳已明聲未已又秋興秋池閣風傍曉庭簾幙霜葉未衰吹未落半驚鴉喜鵲自笑浮名情薄似與世人疎略一片嬾心雙嬾脚好教閒處著又秋感今夜雨斷送一年殘暑坐聽潮聲來别浦明朝何處去辜負金尊綠醑來歲今宵圓否酒醒夢囘愁幾許夜闌還獨語清平樂秋詞清淮濁汴更在江西㟁紅斾到時黄葉亂霜入梁王故苑秋原何處攜壺停驂訪古踟蹰雙廟遺風尚在漆園傲吏應無雙荷葉雙溪月清光偏照雙荷葉雙荷葉紅心未偶綠衣偷結背風迎雨淚珠滑輕舟短櫂先秋折先秋折煙鬟未上玉盃微缺更漏子送孫巨源水涵空山照市西漢二疎鄉里新白髪舊黄金故人恩義深海東頭山盡處自古客槎來去槎有信赴秋期使君行不歸占春芳紅杏了夭桃盡獨自占春芳不比人間蘭麝自然透骨生香對酒莫相忘似佳人兼合明光只憂長笛吹花落除是寧王烏夜啼寄遠莫怪歸心甚速西湖自有蛾眉若見故人須細説白髪倍當時小鄭非常強記二南依舊能詩更有鱸魚堪切膾兒輩莫教知阮郎歸初夏綠槐高柳咽新蟬薰風初入絃碧紗窗下水沉煙棊聲驚晝眠微雨過小荷翻榴花開欲然玉盆纖手弄清泉瓊珠碎又圓又集句梅花舊重刻醉桃源香腮作宫粧莫春作莫雲暗香浮動月黄昏堂前一樹春東風何事入西鄰兒家常閉門雪肌冷玉容真香腮粉未勻折花欲寄隴頭人江南日莫春又蘇州席上作一年三度過蘇臺清尊長是開佳人相問苦相猜這囘來不來情未盡老先催人生真可咍他年桃李阿誰栽劉郎雙鬢摧虞美人影莫春華胥夢斷人何處聽得鸎啼紅樹幾點薔薇香雨寂寞閒庭戸㬉風不解留花住片片著人無數樓上望春歸去芳草迷歸路西江月真覺賞瑞香公子眼花亂發老夫鼻觀先通領巾飄下瑞香風驚起謫仙春夢后土祠中玉蕋蓬萊殿後鞓紅此花清絶更纖穠把酒何人心動又坐客見和復次韻小院朱欄幾曲重城畫鼓三通更看微月轉光風歸去香雲入夢翠袖爭浮大白皁羅半插斜紅燈花零落酒花穠妙語一時飛動又再用前韻戲曹子方坐客云瑞香為紫丁香遂以此曲辯證之恠此花枝怨泣託君詩句名通慿將草木記吳風繼取相如雲夢點筆袖沾醉墨謗花面有慙紅知君却是為情穠怕見此花撩動又聞道雙銜鳳帶不妨單著鮫綃夜香知與阿誰燒悵望水沉煙裊雲鬢風前綠巻玉顔醉裡紅潮莫教空度可憐宵月與佳人共撩又重九點點樓頭細雨重重江外平湖當年戲馬㑹東徐今日凄涼南浦莫恨黄花未吐且教紅粉相扶酒闌不必看茱萸頫仰人間今古又送茶并谷簾與王勝之龍焙今年絶品谷簾自古珍泉雪芽雙井散神仙苗裔來從北苑湯發雲腴釅白盞浮花乳輕圓人間誰敢更爭妍鬬取紅窗粉面又姑熟再見勝之次前韻或刻山谷詞别夢已隨流水淚巾猶裛香泉相如依舊是臞仙人在瑤臺閬苑花霧縈風縹緲歌珠滴水清圓蛾眉新作十分妍走馬歸來便面又黄州中秋世事一場大夢人生幾度秋涼夜來風葉已鳴廊看取眉頭鬢上酒賤常愁客少月明多被雲妨中秋誰與共孤光把醆凄然北望又送錢待制莫歎平原落落且應去魯遲遲與君各記少年時須信人生如寄白髪千莖相送深盃百罰休辭拍浮何用酒為池我已為君德醉又梅花玉骨那愁瘴霧氷肌自有仙風海仙時遣探芳樷倒掛綠毛么鳳素面翻嫌粉涴洗妝不褪脣紅高情已逐曉雲空不與梨花同夢惠州梅花上珍禽曰倒掛子似綠毛鳳而小又春夜行蘄水中過酒家飲酒醉乘月至一溪橋上解鞍曲肱少休及覺已曉亂山葱蘢不謂人世也書此詞於橋柱上照野瀰瀰淺浪横空曖曖微霄障泥未解玉驄驕我欲醉眠芳草可惜一溪明月莫教踏碎瓊瑤解鞍欹枕綠楊橋杜宇數聲春曉又平山堂三過平山堂下半生彈指聲中十年不見老仙翁壁上龍蛇飛動欲弔文章太守仍歌楊柳春風休言萬事轉頭空未轉頭時皆夢又蘇州交代林子中席上作昨日扁舟京口今朝馬首長安舊官何物與新官只有湖山公案此景百年幾變箇中下語千難使君才氣巻波瀾與把新詩判斷少年遊端午贈黄守徐君猷銀塘朱檻麴塵波圓綠巻新荷蘭條薦浴菖花釀酒天氣尚清和好將沉醉酬佳節十分酒十分歌獄草煙深訟庭人悄無恡宴遊過又黄之僑人郭氏毎歲正月迎紫姑神以箕為腹箸為口畫灰盤中為詩敏捷立成余往觀之神請予作少年遊乃以此戲之玉肌鉛粉傲秋霜凖擬鳳呼凰伶倫不見清香未吐且糠粃吹揚到處成雙君獨隻空無數爛文章一點香檀誰能借箸無復似張良又潤州作去年相送餘杭門外飛雪似楊花今年春盡楊花似雪猶不見還家對酒捲簾邀明月風露透窗紗恰似嫦娥憐雙燕分明照畫梁斜瑤池燕琴曲有瑤池燕變其詞作閨怨寄陳季常飛花成陣春心困寸寸别腸多少愁悶無人問偷啼自搵殘妝粉抱瑤琴尋出新韻玉纖趁南風未解幽慍低雲鬢眉峰歛暈嬌和恨南柯子遊賞山與歌眉斂波同醉眼流遊人都上十三樓不羨竹西歌吹古揚州菰黍連昌歜瓊彞倒玉舟誰家水調唱歌頭聲繞碧山飛去晩雲留又湖景和前韻古岸開青葑新渠走碧流㑹看光滿萬家樓記取他年扶路入西州佳節連梅雨餘生寄葉舟只將菱角與雞頭更有月明千頃一時留又寓意雨暗初疑夜風囘忽報晴淡雲斜照著山明細草軟沙溪路馬蹄輕卯酒醒還困仙材夢不成藍橋何處覓雲英只有多情流水伴人行又和前韻日出西山雨無晴又有晴亂山深處過清明不見綵繩花板細腰輕盡日行桑野無人與目成且將新句琢瓊英我是世間閒客此閒行又再用前韻帶酒衝山雨和衣睡晩晴不知鐘鼓報天明夢裏栩然蝴蝶一身輕老去才都盡歸來計未成求田問舍笑豪英自愛湖邊沙路免泥行又晩春日薄花房綻風和麥浪輕夜來微雨洗郊坰正是一年春好近清明已改煎茶火猶調入粥餳使君高㑹有餘清此樂無聲無味最難名又八月十八日觀潮海上乘槎侶仙人蕚綠華飛昇元不用丹砂住在潮頭來處𣺌天涯雷輥夫差國雲翻海若家坐中安得弄琴牙寫取餘聲歸向水仙誇又再用前韻苒苒中秋過蕭蕭兩鬢華寓身化世一塵沙笑看潮來潮去了生涯方士三山路漁人一葉家早知身世兩聱牙好伴騎鯨公子賦雄誇又東坡守錢塘無日不在西湖嘗攜妓謁大通禪師大通慍形於色東坡作長短句令妓歌之師唱誰家曲宗風嗣阿誰借君拍板與門搥我也逢場作戲莫相疑溪女方偷眼山僧莫貶眉却愁彌勒下生遲不見老婆三五少年時又别潤州許仲途欲執河梁手還升月旦堂酒闌人散月侵廊北客明朝歸去雁南翔窈窕高明玉風流鄭季莊一時分散水雲鄉惟有落花芳草㫁人腸又湖州作山雨瀟瀟過溪橋瀏瀏清小園幽榭枕蘋汀門外月華如水綵舟横岧㟁霜花盡江湖雪陣平兩山遙指海門青囘首水雲何處覓孤城又莫春紫陌尋春去紅塵拂面來無人不道看花囘惟見石榴新蕋一枝開氷簟堆雲髻金樽灩玉醅綠陰青子莫相催留取紅巾千點照池臺又黄州臘月八日飲懷民小閣衛霍元勲後韋平外族賢吹笙只合在緱山閒駕綵鸞歸去趁新年烘暖燒香閣輕寒浴佛天他年一醉畫堂前莫忘故人顦顇老江邊又有感笑怕薔薇罥行憂寶瑟僵美人依約在西廂只恐暗中迷路認餘香午夜風翻幔三更月到床簟紋如水玉肌涼何物與儂歸去有殘妝又感舊才恨誰云短綿綿豈易裁半年眉綠未㑹開明月好風閒處是人猜春雨消殘凍温風到冷灰樽前一曲為誰哉留取曲中一拍待君來又楚守周豫出舞鬟因作二首贈之紺綰雙蟠髻雲欹小偃巾輕盈紅臉小腰身疊鼓忽催花拍鬬精神空濶輕紅歇風和約柳春蓬山才調最清新勝似纒頭千錦共藏珍又同前琥珀裝腰佩龍香入領巾只應飛燕是前身共看剥蔥纖手舞凝神柳絮風前轉梅花雪裏春鴛鴦翡翠兩爭新但得周郎一顧勝珠珍又舞妓雲鬢裁新綠霞衣曳曉紅待歌凝立翠筵中一朶彩雲何事下巫峰趁拍鸞飛鏡囘身燕漾空莫翻紅袖過簾櫳怕被楊花勾引嫁東風又見説東園好能消北客愁雖非吾土且登樓行盡江南南㟁此淹留短日明楓纈清香暗菊毬流年囘首付東流慿仗挽囘潘鬢莫教秋望江南春未老風細柳斜斜試上超然臺上看半壕春水一城花煙雨暗千家寒食後酒醒却咨嗟休對故人思故國且將新火試新茶詩酒趁年華又莫春春已老春服幾時成曲水浪低蕉葉穩舞雩風軟苧羅輕酣詠樂昇平微雨過何處不催耕百舌無言桃李盡柘枝深處鵓鴣鳴春色屬蕪菁浪淘沙探春昨日出東城試探春情牆頭紅杏暗如傾檻内羣芳芽未吐早已囘春綺陌斂香塵雪霽前村東君用意不辭辛料想春光先到處吹綻梅英鷓鴣天時謫黄州舊刻三首攷西塞山前白鷺飛一首是黄山谷作今刪去林斷山明竹隱牆亂蟬衰草小池塘翻空白鳥時時見照水紅蕖細細香村舍外古城傍杖藜徐歩轉斜陽慇懃昨夜三更雨又得浮生一日涼又陳公密出侍兒素娘歌紫玉簫曲勸老人酒老人飲盡因為賦此詞笑撚紅牙嚲翠翹揚州十里最妖嬈夜來綺席親曾見撮得精神滴滴嬌嬌後眼舞時腰劉郎幾度欲魂消明朝酒醒知何處腸斷雲間紫玉簫玉樓春次歐公西湖韻霜餘已失長淮闊空聽潺潺清瀨咽佳人猶唱醉翁詞四十三年如電抹草頭秋露流珠滑三五盈盈還二八與予同是識翁人惟有西湖波底月又次馬中玉韻知君仙骨無寒暑千載相逢猶旦暮故將别語惱佳人要看梨花枝上雨落花已逐迴風去花本無心鶯自訴明朝歸路下塘西不見鶯啼花落處又宿造口聞夜雨寄子由才叔梧桐葉上三更雨驚破夢魂無覔處夜涼枕簟已知秋更聽寒蛩促機杼夢中厯厯來時路猶在江亭醉歌舞尊前必有問君人為道别來心與緒又元宵似是歡遊好何况公庭民訟少萬家遊賞上春臺十里神仙迷海島平原不似高陽傲促席雍容陪語笑坐中有客最多情不惜玉山􅂸醉倒又經旬未識東君信一夕薰風來解愠紅綃衣薄麥秋寒綠綺韻低梅雨潤瓜頭綠染山光嫩弄色金桃新傅粉日高慵捲水晶簾猶帶春醪紅玉困又上三調元刻不載高平四面開雄壘三月風光初覺媚園中桃李使君家城上亭臺遊客醉歌翻楊柳金尊沸飲散凭闌無限意雲深不見玉關遙草細山重殘照裏南鄉子春情晩景落瓊盃照眼雲山翠作堆認得岷峨春雪浪初來萬頃蒲萄漲淥醅暮雨暗陽臺亂灑高樓溼粉腮一陣東風來捲地吹迴落照江天一半開又梅花詞和楊元素寒雀滿疎籬爭抱寒柯看玉蕤忽見客來花下坐驚飛踏散芳英落酒巵痛飲又能詩坐客無氊醉不知花盡酒闌春到也離離一點微酸已著枝又席上勸李公擇酒不到謝公臺明月清風好在哉舊日髯孫何處去重來短李風流更上才秋色漸摧頺滿院黄英映酒盃看取桃花春二月爭開盡是劉郎去後栽又重九涵輝樓呈徐君猷霜降水痕収淺碧鱗鱗露遠洲酒力漸消風力軟颼颼破帽多情却戀頭佳節若為酬但把清尊斷送秋萬事到頭都是夢休休明日黄花蝶也愁又送述古囘首亂山横不見居人只見城誰似臨平山上墖亭亭迎客西來送客行臨路晩風清一枕初寒夢不成今夜殘燈斜照處熒熒秋雨晴時淚不晴又有感氷雪透香肌姑射仙人不似伊濯錦江頭新樣錦非宜故著尋常淡薄衣㬉日下重幃春睡香凝索起遲曼倩風流緣底事當時愛被西真喚作兒又和楊元素東武望餘杭雲海天涯兩杳茫何日功成名遂了還鄉醉笑陪公三萬場不用訴離觴痛飲從來别有腸今夜送歸燈火冷河塘墮淚羊公却姓楊又自述涼簟碧紗㡡一枕清風晝睡餘臥聽晩衙無一事徐徐讀盡牀頭幾巻書搔首賦歸歟自覺功名嬾更疎若問使君才與術何如占得人間一味愚又沈強輔雯上出犀麗玉作胡琴送元素還朝同子野各賦一首裙帶石榴紅却水慇懃解贈儂應許逐雞雞莫怕相逢一點靈犀必暗通何處遇良工琢刻天真半欲空願作龍香雙鳳撥輕攏長在環兒白雪胷又贈行旌斾滿江湖詔發樓船萬舳艫投筆將軍因笑我迂儒帕首腰刀是丈夫粉淚怨離居喜子垂窗報捷書試問伏波三萬語何如一斛明珠換綠珠又雙荔枝天與化工知賜得衣裳總是緋毎向華堂深處見憐伊兩箇心腸一片兒自小便相隨綺席歌筵不暫離苦恨人人分析破東西怎得成雙似舊時又集句寒玉細凝膚吳融清歌一曲倒金壺鄭谷杏葉菖條徧相識李啇隱爭如豆䓻花梢二月初杜牧年少即須臾白居昜芳時偷得醉工夫白居易羅帳細垂銀燭背韓渥歡娛豁得平生俊氣無杜牧又集句悵望送春盃杜牧漸老逢春能幾囘杜甫花滿楚城愁遠别許渾傷懐何况清絲急管催劉禹錫吟㫁望鄉臺李啇隱萬里歸心獨上來許渾景物登臨閒始見杜牧徘徊一寸相思一寸灰李啇隱又集句何處倚闌干杜牧絃管髙樓月正圓杜牧蝴蝶夢中家萬里崔塗依然老去愁來強自寛杜甫明鏡借紅顔李啇隱須著人間比夢間韓愈蠟燭半籠金翡翠李啇隱更闌繡被焚香獨自眠許渾又用韻和道輔未倦長卿遊漫舞天歌爛不収不是使君能矯世誰留教有瓊梳脱麝油香粉縷金裘花豔紅箋筆欲流從此丹脣并皓齒清柔唱遍山東一百州又用前韻贈田叔通家舞鬟繡鞅玉鐶遊燈晃簾疎笑却収久立香車催欲上還留更且檀脣點杏油花遍六么毬面旋迴風帶雪流春入腰肢金縷細輕柔種柳應須柳柳州鵲橋仙七夕緱山仙子高情雲𣺌不學癡牛騃女鳳簫聲斷月明中舉手謝時人欲去客槎曾犯銀河微浪尚帶天風海雨相逢一醉是前縁風雨散飄然何處又七夕和蘇堅韻乘槎歸去成都何在萬里江沱漢漾與君各賦一篇詩留織女鴛鴦機上還將舊曲重賡新韻須信吾儕天放人生何處不兒嬉看乞巧朱樓綵舫瑞鷓鴣觀潮碧山影裏小紅旗儂是江南踏浪兒拍手欲嘲山簡醉齊聲爭唱浪婆詞西興渡口㠶初落漁浦山頭日未欹儂欲送潮歌底曲尊前還唱使君詩又城頭月落尚啼烏朱艦紅船早滿湖鼓吹未容迎五馬水雲先已漾雙鳬映山黄帽螭頭舫夾㟁青煙鵲尾爐老病逢春只思睡獨求僧榻寄須㬰翻香令金爐猶㬉麝煤殘惜香更把寳釵翻重聞處餘熏在這一番氣味勝從前背人偷葢小蓬山更將沉水暗同燃且圖得氤氲乆為情深嫌怕斷頭煙虞美人琵琶定場賀老今何在幾度新聲改新聲坐使舊聲闌俗耳只知繁手不須彈斷弦試問誰能曉七歲文姬小試教彈作輥雷聲應有開元遺老淚縱横又送馬中玉元刻述懷歸心正似三春草試著萊衣小橘懐幾日向翁開懐祖已嗔文度不歸來禪心已斷人間愛只有平交在笑論瓜葛一枰同看取靈光新賦有家風又陳述古守杭已及瓜代未交前數日宴僚佐於有美堂因請貳車蘇子瞻賦詞子瞻即席而就寄攤破虞美人湖山信是東南美一望須千里使君能得幾囘來便使樽前醉倒且徘徊沙河塘裏燈初上水調誰家唱夜闌風靜欲歸時惟有一江明月碧琉璃又東坡與秦少游維揚飲别作此詞或刻賀方囘或刻黄山谷或刻秦淮海或刻晏小山波聲拍枕長淮曉隙月窺人小無情忭水自東流只載一船離恨向西州竹溪花浦曾同醉酒味多於淚誰教風鑑在塵埃醖造一場煩惱送人來又落花已作風前舞又送黄昏雨曉來庭院半殘紅惟有遊絲千丈裊晴空慇懃花下重攜手更盡盃中酒美人不用歛歌眉我亦多情無奈酒闌時又氷肌自是生來瘦􅄼更分飛後日長簾幙望黄昏及至黄昏時候轉銷魂君還知道相思苦怎忍抛奴去不辭迢逓過關山只恐别郎容易見郎難又深深庭院清明過桃李初紅破柳絲搭在玉欄干簾外瀟瀟微雨做輕寒晩晴臺榭增明媚已􅂸花前醉更闌人静月侵廊獨自行來行去好思量又持盃遙勸天邊月願月圓無缺持盃更復勸花枝且願花枝長在莫離披持盃月下花前醉休問榮枯事此歡能有幾人知對酒逢花不飲待何時一斛珠洛城春晩垂楊亂掩紅樓半小池輕浪紋如篆燭下花前曾醉離歌宴自惜風流雲雨散關山有限情無限待君重見尋芳伴為説相思目斷西樓燕醉落魄舊刻四首山谷老人云醉醒醒醉非東坡作刪去席上呈元素分攜如昨人生到處萍飄泊偶然相聚還離索多病多愁須信從來錯樽前一笑休辭却天涯同是傷淪落故山猶負平生約西望峨嵋長羨歸飛鶴又蘇州閶門留别一刻山谷但故山歸計何時决作故鄉歸路無因得蒼頭華髮故山歸計何時決舊交新貴音書絶惟有佳人猶作殷勤别離亭欲去歌聲咽瀟瀟細雨涼吹頰淚珠不用羅巾裛彈在羅衣圖得見時説又離京口作輕雲微月二更酒醒船初發孤城囘望蒼煙合公子佳人不記歸時節巾偏扇墜藤床滑覺來幽夢無人説此生飄蕩何時歇家在西南長作東南别臨江仙龍邱子自洛之蜀載二侍女戎裝駿馬至溪山佳處輒留數日見者以為異人後十年築室黄岡之北號曰静菴居士作此贈之細馬遠馱雙侍女青巾玉帶紅靴溪山好處便為家誰知巴峽路却見洛城花面旋落英飛玉蕋人間春日初斜十年不見紫雲車龍邱新洞府鉛鼎養丹砂又贈送詩句揣來磨我鈍鈍錐不解生鋩歡顔為我解氷霜酒闌清夢覺春草滿池塘應念雪堂坡下老昔年共採芸香功成名遂早還鄉囘車來過我喬木擁千章又辛未離杭至潤別張弼秉道我勸髯張歸去好從來自已忘情塵心消盡道心平江南與塞北何處不堪行俎豆庚桑真過矣慿君説與南榮願聞吳越報豐登君王如有問結襪賴王生又冬日即事自古相從休務日何妨低唱微吟天垂雲重作春陰坐中人半醉簾外雪將深聞道分司狂御史紫雲無路追尋凄風寒雨更駸駸問囚長損氣見鶴總驚心又送王緘忘却成都來十載因君未免思量慿將清淚灑江陽故鄉知好在孤客自悲涼坐上別愁君未見歸來欲斷無腸殷勤且更盡離觴此身如傳舍何處是吾鄉又夜到揚州席上作尊酒何人懷李白草堂遙指江東珠簾十里巻香風花開花又謝離恨幾千重輕舸度江連夜到一時驚笑衰容語音猶自帶吳儂夜闌相對處依舊夢魂中又九十日春都過了貪忙何處追遊三分春色一分愁雨翻榆莢陣風轉柳花毬閬苑先生須自責蟠桃動是千秋不知人世苦厭求東皇不拘束肯為使君留又風水洞作四大從來都遍滿此間風水何疑故應為我發新詩幽花香澗谷寒藻舞淪漪借與玉川生兩腋天仙未必相思還慿流水送人歸層巔餘落日草露已沾衣又一別都門三改火天涯踏盡紅塵依然一笑作春温無波真古井有節是秋筠惆悵孤㠶連夜發送行淡月微雲尊前不用翠眉顰人生如逆旅我亦是行人又疾愈登望湖樓贈項長官多病休文都瘦損不堪金帶垂腰望湖樓上暗香飄和風春弄袖明月夜聞簫酒醒夢囘清漏永隱牀無限更潮佳人不見董嬌嬈徘徊花上月空度可憐宵又夜飲東坡醒復醉歸來髣髴三更家童鼻息已雷鳴敲門都不應倚杖聽江聲長恨此身非我有何時忘却營營夜闌風静縠紋平小舟從此逝江海寄餘生又冬夜夜寒氷合井畫堂明月侵幃青釭明滅照悲啼青釭挑欲盡粉淚裛還垂未盡一尊先掩淚歌聲半帶清悲情聲兩盡莫相違欲知腸斷處梁上暗塵飛又贈王友道誰道東陽都瘦損凝然點漆精神瑤林終自隔風塵試看披鶴氅仍是謫仙人省可清言揮玉塵真須保器全真風流何似道家純不應同蜀客唯愛卓文君又元刻不載昨夜渡江何處宿望中疑是秦淮月明誰起笛中哀多情玉謝女相逐過江來雲雨未成還又散思量好事難諧慿陵急槳兩相催想伊歸去後應似我情懷蝶戀花春景花褪殘紅青杏了燕子飛時綠水人家繞枝上柳綿吹又少天涯何處無芳草牆裏鞦韆牆外道牆外行人牆裏佳人笑笑漸不聞聲漸悄多情却被無情惱飛一作來又佳人一顆櫻桃樊素口不愛黄金只愛人長乆學畫鴉兒猶未就眉尖已作傷春皺撲蝶西園隨伴走花落花開漸解相思瘦破鏡重圓人在否章臺折盡青青柳又送春雨過春容清更麗只有幽人幽恨終難洗北固山前三面水碧瓊梳擁青螺髻一紙鄉書來萬里問我何年真箇成歸計白首送春􅂸一醉東風吹破千行淚又莫春別李公擇蓛蓛無風花自嚲寂莫園林柳老櫻桃過落日多情還照座山青一點横雲破路盡河囘千轉柁繫攬漁村月暗孤燈火慿仗飛魂招楚些我思君處君思我又密州上元燈火錢塘三五夜明月如霜照見人如畫帳底吹笙香吐麝此般風味應無價寂莫山城人老也擊鼓吹簫乍入農桑社火冷燈希霜露下昏昏雪意雲垂野又密州冬夜文安國席上作簾外東風交雨霰簾裡佳人笑語如鶯燕深惜今年正月暖燈光酒色搖金盞摻鼓漁陽撾未遍舞褪瓊釵汗溼香羅軟今夜何人吟古怨清詩未就氷生硯又過漣水贈趙晦之自古漣漪佳絶地遶郭荷花欲把吳興比倦客塵埃何處洗真君堂下寒泉水左海門前酤酒市夜半潮來月下孤舟起傾葢相逢􅂸一醉雙鳬飛去人千里又述懐雲水縈囘溪上路疉疉青山環繞溪東注月白沙汀翹宿鷺更無一點塵來處溪叟相看私自語底事區區苦要為官去尊酒不空田百畝歸來分得閒中趣又離别春事闌珊芳草歇客裏風光又過清明節小院黄昏人憶別落紅處處聞啼鴂咫尺江山分楚越目斷魂消應是音塵絶夢破五更心欲折角聲吹落梅花月又送潘大臨別酒勸君君一醉清潤潘郎又是何郎壻記取釵頭新利市莫將分付東鄰子囘首長安佳麗地三十年前我是風流帥為向青樓尋舊事花枝缺處餘名字又同安生日放魚取金光明經救魚事泛泛東風初破五江柳微黄萬萬千千縷佳氣鬱蔥來繡戸當年江上生竒女一盞壽觴誰與舉三箇明珠膝上王文度放盡窮鱗看圉圉天公為下曼陀雨又下五調俱元刻不載記得畫堂初㑹遇好夢驚囘望㫁高唐路燕子雙飛來又去紗窗幾度春光暮那日繡簾相見處低眼佯行笑整香雲縷斂盡春山羞不語人前深意難輕訴又昨夜秋風來萬里月上屏幃冷透人衣袂有客抱衾愁不寐那堪玉漏長如歲羇舍留連歸計未夢㫁魂銷一枕相思淚衣帶漸寛無別意新書報我添顦顇又或刻晏同叔玉枕氷寒消暑氣碧簟紗厨向午朦朧睡鶯舌惺憁如㑹意無端畫扇驚飛起雨後初涼生水際人面桃花的的遙相似眼看紅芳猶抱蕋樷中已結新蓮子又雨霰疎疎經潑火巷陌鞦韆猶未清明過杏子梢頭香蕾破淡紅褪白胭脂涴苦被多情相折挫病緒厭厭渾似年時過遶遍迴廊還獨坐月籠雲暗重門鎖又蝶嬾鶯慵春過半花落狂風小院殘紅滿午醉未醒紅日晩黄昏簾幙無人捲雲鬢鬅鬆眉黛淺總是愁媒欲訴誰消遣未信此情難繫絆楊花猶有東風管荷華媚荷花霞苞霓荷碧天然地別是風流標格重重青葢下千嬌照水好紅紅白白每恨望明月清風夜甚低迷不語妖邪無力終須放船兒去清香深處住看伊顔色漁家傲金陵賞心亭送王勝之龍圖王守金陵視事一日移南郡千古龍蟠并虎踞從公一弔興亡處𣺌𣺌斜風吹細雨芳草渡江南父老留公住公駕飛車凌彩霧紅鸞驂椉青鸞馭却訝此洲名白鷺非吾侶翻然欲下還飛去又送台守江郎中送客歸來燈火盡西樓淡月涼生暈明日潮來無定凖風未穩舟横渡口重城近江水似知孤客恨南風為解佳人愠莫學時流輕久困頻寄問錢塘江上須忠信又皎皎牽牛河漢女盈盈臨水無由語望㫁碧雲空日暮無尋處夢囘芳草生春浦鳥散餘花紛似雨汀洲蘋老香風度明月多情來照戸但攬取清光長送人歸去又送張元唐省親秦州一曲陽關情幾許知君欲向秦川去白馬皂貂留不住囘首處孤城不見天霖霧到日長安花似雨故關楊柳初飛絮漸見靴刀迎夾路誰得似風流膝上王文度又贈曹光州些小白鬚何用染幾人得見星星點作郡浮光雖似箭君莫厭也應勝我三年貶我欲自嗟還不敢向來三郡寧非忝婚嫁事稀年冉冉知有漸千鈞重擔從頭減又元刻不載臨水縱横囘晩鞚歸來轉覺情懷動梅笛煙中聞幾弄秋陰重西山雪淡雲凝凍美酒一盃誰與共尊前舞雪狂歌送腰跨金魚旌斾擁將何用衹堪妝點浮生夢定風波十月九日孟亨之置酒秋香亭有拒霜獨向君猷而開坐客喜笑以為非使君莫可當此花故作是詞兩兩輕紅半暈腮依依獨為使君囘若道使君無此意何為雙花不向别人開但看低昻煙雨裏不已勸君休訴十分盃更問尊前狂副使來歲花開時節與誰來又三月七日沙湖道中遇雨雨具先去同行皆狼狽余獨不覺已而遂晴故作此詞莫聽穿林打葉聲何妨吟嘯且徐行竹杖芒鞵輕勝馬誰怕一蓑煙雨任平生料峭春風吹酒醒微冷山頭斜照却相迎囘首向來瀟灑處歸去也無風雨也無晴又重陽括杜牧之詩與客攜壺上翠微江涵秋影雁初飛塵世難逢開口笑年少菊花須插滿頭歸酩酊但酬佳節了雲嶠登臨不用怨斜暉古往今來誰不老多少牛山何必更沾衣又感舊莫怪鴛鴦繡帶長腰輕不勝舞衣裳薄倖只貪遊冶去何處垂楊繫馬恣輕狂花謝絮飛春又盡堪恨㫁絃塵管伴啼妝不信歸來但自看怕見為郎顦顇却羞郎又送元素千古風流阮歩兵平生遊宦愛東平千里遠來還不住歸去空留風韻照人清紅粉尊前深懊惱知道怎生留得許多情記得明年花絮亂須看泛西湖是斷腸聲又元豐六年七月六日王文甫家飲釀白酒大醉集古句作墨竹詞雨洗涓涓嫩葉光風吹細細綠筠香秀色亂侵書帙晩簾巻清陰微過酒尊涼人畫竹身肥擁腫何用先生落筆勝蕭郎記得小軒岑寂夜廊下月和疎影上東牆又詠紅梅好睡慵開莫厭遲自憐氷臉不時宜偶作小紅桃杏色閒雅尚餘孤瘦雪霜姿休把閒心隨物態何事酒生微暈沁瑤肌詩老不知梅格在吟詠更看綠葉與青枝又余昔與張子野劉孝叔李公擇陳令舉楊公素㑹於吳興時子野作六客詞其卒章盡道賢人聚吳分試問也應㫄有老人星凡二十五年再過吳興而五人者皆已亡矣時張仲謀與曹子方劉景文蘇伯固張秉道為坐客仲謀請作後六客詞月滿苕溪照夜堂五星一老鬭光芒十五年間真夢裏何事長庚對月獨凄涼綠鬢蒼顔同一醉還是六人吟笑水雲鄉賓主談鋒誰得似看取曹劉今對兩蘇張又王定國歌兒曰柔奴姓宇文氏眉目娟麗善應對家世住京師定國南遷歸余問柔廣南風土應是不好柔對曰此心安處便是吾鄉因為綴詞云常羨人間琢玉郎天教分付點酥娘自作清歌傳皓齒風起雪飛炎海變清涼萬里歸來顔愈少微笑時時猶帶嶺梅香試問嶺南應不好却道此心安處是吾鄉十拍子莫秋白酒新開九醖黄花已過重陽身外儻來都似夢醉裏無何即是鄉東坡日月長玉粉旋烹茶乳金虀新擣橙香強染霜髭扶翠袖莫道狂夫不解狂狂夫老更狂蘇幙遮詠選仙圖暑籠晴風解愠雨後餘清暗襲衣裾潤一局選仙逃暑困笑指尊前誰向青霄近整金盆輪玉笋鳳駕鸞車誰敢爭先進重五休言升最𦂳縱有碧油到了輸堂印調笑令漁父漁父江上微風細雨青蓑黄篛裳衣紅酒白魚莫歸歸莫歸莫長笛一聲何處歸雁歸雁飲啄江南南㟁將飛却下盤旋塞外春來苦寒寒苦寒苦藻荇欲生且住行香子密雲龍茶名極為甘馨宋廖正一字明畧晩登蘇東坡之門公大竒之時黄秦􅄯張號蘇門四學士東坡待之厚毎來必令侍妾朝雲取密雲龍家人以此知之一日又命取密雲龍家人謂是四學士窺之乃廖明略也綺席纔終歡意猶濃酒闌時高興無窮共誇君賜初拆臣封看分香餅黄金縷密雲龍鬬贏一水功敵千鍾覺涼生兩腋清風暫留紅袖少却紗籠放笙歌散庭館静略從容又寓意三入承明四至九卿問書生何辱何榮金張七葉紈綺貂纓無汗馬事不獻賦不明經成都卜肆寂莫君平鄭子真巖谷躬耕寒灰炙手人重人輕除竺乾學得無念得無名又述懷清夜無塵月色如銀酒斟時須滿十分浮名浮利休苦勞神歎隙中駒石中火夢中身雖抱文章開口誰親且陶陶樂盡天真幾時歸去作箇閒人對一張琴一壺酒一溪雲又秋興涼夜霜風先入梧桐渾無處囘避衰容問公何事不語書空但一囘醉一囘病一囘慵秋來庭下光陰如箭似無言有意傷儂都將萬事付與千鍾任酒花白眼花亂燭花紅又冬思攜手江村梅雪飄裙情何限處處銷魂故人不見舊曲重聞向望湖樓孤山寺湧金門尋常行處題詩千首繡羅衫與拂紅塵別來相憶知是何人有湖中月江邊柳隴頭雲又過七里灘一葉舟輕雙槳鴻驚水天清影湛波平魚翻藻鑑鷺點煙汀過沙溪急霜溪冷月溪明重重似畫曲曲如屏算當年空老嚴陵君臣一夢今古虚名但遠山長雲山亂曉山青又與泗守過南山晩歸作北望平川野水荒灣共尋春飛歩孱顔一作潺湲和風弄袖香霧縈鬟正酒酣適人語笑白雲間飛鴻落照相將歸去澹娟娟玉宇清閒何人無事晏坐空山望長橋上燈火亂使君還青玉案和賀方囘韻送伯固歸吳中故居三年枕上吳中路遣黄耳隨君去若到松江呼小渡莫驚鷗鷺四橋盡是老子經行處輞川圖上看春莫常記高人右丞句作箇歸期天已許春衫猶是小蠻針線曾溼西湖雨殢人嬌王都尉席上贈侍人滿院桃花盡是劉郎未見於中更一枝纖軟仙家日月笑人間春晩濃睡起驚飛亂紅千片密意難窺羞容易見平白地為伊腸斷問君終日怎安排心眼須信道司空自來見慣又贈朝雲白髮蒼顔正是維摩境界空方丈散花何礙朱脣筯點更髻鬟生采這㱔箇千生萬生只在好事心腸著人情態閒窗下斂雲凝黛明朝端午學糿蘭為佩尋一首好詩要書裙帶又戲邦直別駕來時滿城燈火無數向青瑣隙中偷覻元來便是共採鸞仙侶方見了管須低聲説與百子流蘇千枝寶炬人間有洞房煙霧春來何事故抛人別處坐望斷樓中遠山歸路江城子陶淵明以正月五日遊斜川臨流班坐顧瞻南阜愛曾城之獨秀乃作斜川詩至今使人想見其處元豐壬戌之春余躬耕於東坡築雪堂居之南挹四望亭之後邱西控北山之微泉慨然而歎此亦斜川之遊也乃作長短句以江城子歌之舊刻十四首攷南來飛燕北歸鴻是秦淮海作刪夢中了了醉中醒只淵明是前生走遍人間依舊却躬耕昨夜東坡春雨足烏鵲喜報新晴雪堂西畔暗泉鳴北山傾小溪横南望亭邱孤秀聳曾城都是斜川當日境吾老矣寄餘齡又述古去餘杭為去思者作元刻孤竹閣送述古翠蛾羞黛怯人看掩霜紈淚偷彈且盡一尊収淚唱陽關謾道帝城天樣遠天易見見君難畫堂新搆近孤山曲欄干為誰安飛絮落花春色屬明年欲棹小舟尋舊事無處問水連天又湖上與張先同賦元刻江景鳳皇山下雨初晴水風清晩霞明一朶芙蕖開過尚盈盈何處飛來雙白鷺如有意慕娉婷忽聞江上弄哀筆苦含情遣誰聽烟斂雲収依約是湘靈欲待曲終尋問取人不見數峰青又獵詞老夫聊發少年狂左牽黄右擎蒼錦帽貂裘千騎巻平岡為報傾城隨太守親射虎看孫郎酒酣胷膽尚開張鬢微霜又何妨持節雲中何日遣馮唐㑹挽雕弓如滿月西北望射天狼又恨别天涯流落思無窮旣相逢却匆匆攜手佳人和淚折殘紅為問東風餘幾許春縱在與誰同隋堤三月水溶溶背歸鴻去吳中囘望彭城清泗與淮通寄我相思千點淚流不到楚江東又冬景相逢不覺又初寒對尊前惜流年風𦂳離亭氷結淚珠圓雪意留君君且住從此去少清歡轉頭山下轉頭看路漫漫玉花翻銀海光寛何處是超然知道故人相念否攜翠袖倚朱欄又大雪有懷朱康叔使君亦知使君之念我也作江神子以寄之黄昏猶是雨纖纖曉開簾欲平簷江濶天低無處認青帘孤坐凍吟誰伴我揩病目撚衰髯使君留客醉厭厭水晶鹽為誰甜手把梅花東望憶陶潛雪似故人人似雪雖可愛有人嫌又陳直方妾􅄞錢塘人也丐新詞為作此錢塘人好唱陌上花緩緩曲余嘗作數絶以紀其事矣玉人家在鳳皇山水雲間掩門閒門外行人立馬看弓彎十里春風誰指似斜日映繡簾斑多情好事與君還憫新鰥拭餘潸明月空江香霧著雲鬟陌上花開看盡也聞舊曲破朱顔又十年生死兩茫茫不思量自難忘千里孤墳無處話凄涼縱使相逢應不識塵滿面鬢如霜夜來幽夢忽還鄉小軒窗正梳妝相顧無言惟有淚千行料得年年腸㫁處明月夜短松岡又或刻葉夢得或刻張元幹銀濤無際巻蓬瀛落霞明暮雲平曾見青鸞紫鳳下層城二十五絃彈不盡空感慨惜離情蒼梧烟水㫁歸程巻霓旌為誰迎空有千行流淚寄幽貞舞罷魚龍雲海晩千古恨入江聲又前瞻馬耳九仙山碧連天晩雲間城上高臺真箇是超然莫使匆匆雲雨散今夜裏月嬋娟小溪鷗鷺静聨拳去翩翩點輕煙人事凄涼迴首便他年莫忘使君歌笑處垂柳下矮槐前又墨雲拖雨過西樓水東流晩煙収柳外殘陽囘照動簾鈎今夜巫山真箇好花未落酒新篘美人微笑轉星眸月華羞捧金甌歌扇縈風吹散一春愁試問江南諸伴侣誰似我醉揚州又元刻不載膩紅勻臉襯檀脣晚妝新暗傷春手撚花枝誰㑹兩眉顰連理帶頭雙原缺留待與箇中人淡煙籠月繡簾陰畫堂深夜沉沉誰道缺繫得人心一自綠窗偷見後便顦顇到如今千秋歲湖州暫來徐州重陽作淺霜侵緑髮少仍新沐冠直縫巾横幅美人憐我老玉手簪黄菊秋露重真珠落袖沾餘馥座上人如玉花映花奴肉蜂蝶亂飛相逐明年人縱健此㑹應難復須細㸔晩來月上和銀燭河滿子湖州作見説岷峨悽愴旋聞江漢澄清但覺秋來歸夢好西南自有長城東府三人最少西山八國初平莫負花溪縱賞何妨藥市微行試問當壚人在否空敎是處聞名唱著子淵新曲應須分外含情祝英臺近惜別挂輕㠶飛急槳還過釣臺路酒病無聊欹枕聽鳴櫓斷腸簇簇雲山重重煙樹囘首望孤城何處間離阻誰念縈損襄王何曾夢雲雨舊恨前歡心事兩無據要知欲見無由癡心猶自倩人道一聲傳語一叢花今年春淺臘侵年氷雪破春妍東風有信無人見露微意柳際花邊寒夜縱長孤衾易㬉鐘鼓漸清圓朝來初日半含山樓閣淡疎煙遊人便作尋芳計小桃杏應已爭先衰病少情疎慵自放惟愛日高眠皂羅特髻采菱拾翠采菱拾翠算似此佳名阿誰消得采菱拾翠稱使君知客千金買采菱拾翠更羅裙滿把真珠結采菱拾翠正髻鬟初合真箇采菱拾翠但深憐輕拍一雙手采菱拾翠繡衾下抱著俱香滑采菱拾翠待到京尋覓洞仙歌詠柳江南臘盡早梅花開後分付新春與垂柳細腰肢自有入格風流仍更是骨體清英雅秀永豐坊那畔盡日無人惟見金絲弄晴晝㫁腸是飛絮時綠葉成陰無箇事一成消瘦又莫是東風逐君來便吹散眉間一點春皺又僕七歲時見眉山老尼姓朱忘其名年九十餘自言嘗隨其師入蜀主孟昶宫中一日大熱蜀主與花蕋夫人夜起避暑摩訶池上作一詞朱具能記之今四十年朱已死矣人無知此詞者獨記其首兩句暇日尋味豈洞仙歌令乎乃為足之氷肌玉骨自清涼無汗水殿風來暗香滿繡簾開一點明月窺人人未寢欹枕釵横鬢亂起來攜素手庭戸無聲時見疎星渡河漢試問夜如何夜已是三更金波淡玉繩低轉但屈指西風幾時來又不道流年暗中偷換勸金船和元素韻自撰腔命名無情流水多情客勸我如曾識盃行到手休辭却這公道難得曲水池上小字更書年月如對茂林脩竹似永和節纖纖素手如霜雪笑把秋花插尊前莫怪歌聲咽又還是輕別此去翺翔遍賞玉堂金闕欲問再來何歲應有華髮意難忘妓舘元刻不載花擁鴛房記駞肩髻小約鬢眉長輕身翻燕舞低語轉鶯簧相見處便難忘肯親度瑤觴向夜闌歌翻郢曲帶換韓香別來音信難將似雲収楚峽雨散巫陽相逢情有在不語意難量些箇事㫁人腸怎禁得恓惶待與伊移根換葉試又何妨滿江紅董義夫名鉞自倅漕得罪歸鄱陽遇東坡於齊安怪其豐暇自得曰吾再娶柳氏三日而去官吾固不戚戚而憂柳氏不能忘懷於進退也已而欣然同憂患如處富貴吾是以益安焉乃令家僮歌其所作滿江紅東坡嗟歎之次其韻憂喜相尋風雨過一江春綠巫峽夢至今空有亂山屏簇何似伯鸞攜德耀簞瓢未足清歡足漸燦然光彩照階庭生蘭玉幽夢裏傳心曲腸㫁處慿他續文君壻知否笑君卑辱君不見周南歌漢廣天敎夫子休喬木便相將左手抱琴書雲間宿又寄鄂州朱使君江漢西來高樓下蒲萄深碧猶自帶岷峨雲浪錦江春色君是南山遺愛守我為劒外思歸客對此間風物豈無情慇懃説江表傳君休讀狂處士真堪惜空洲對鸚鵡葦花蕭瑟獨笑書生爭底事曹公黄祖俱飄忽願使君還賦謫仙詩追黄鶴又東武會流盃亭東武南城新堤固漣漪初溢隱隱遍長林高阜卧紅堆碧枝上殘花吹盡也與君更向江頭覓問向前猶有幾多春三之一官裏事何時畢風雨外無多日相將泛曲水滿城爭出君不見蘭亭脩禊事當時座上皆豪逸到如今脩竹滿山陰空陳迹又懷子由作清潁東流愁目㫁孤㠶明滅宦遊處青山白浪萬重千疉辜負當年林下意對床夜雨聽蕭瑟恨此生長向別離中添華髮一樽酒黄河側無限事從頭説相看怳如昨許多年月衣上舊痕餘苦淚眉間喜氣添黄色便與君池上覓殘春花如雪又正月十三日送姜安國還朝天豈無情天也解多情留客春向暖朝來底事尚飄輕雪君過春來紆組綬我應歸去躭泉石恐異時盃酒忽相思雲山隔浮世事俱難必人縱健頭應白何辭更一醉此歡難覓欲向佳人訴離恨淚珠先已凝雙睫但莫追新燕却來時音書絶滿庭芳元豐七年四月一日余將自黄移汝留別雪堂鄰里二三君子㑹李仲覽自江東來別遂書以遺之舊刻七首攷北苑龍團是淮海作刪歸去來兮吾歸何處萬里家在岷峨百年強半來日苦無多坐見黄州載閏兒童盡楚語吳歌山中友雞豚社飲相勸老東坡云何當遠去人生底事來往如梭待閒看秋風洛水清波好在堂前細柳應念我莫剪柔柯仍傳語江南父老時與㬠漁蓑又余居黄五年將赴臨汝作滿庭芳一篇以別黄人既至南都䝉恩放歸陽羨復作一篇歸去來兮清溪無底上有千仞嵯峨畫橋西畔天遠夕陽多老去君恩未報空囘首彈鋏悲歌船頭轉長風萬里歸馬駐平坡無何何處是銀潢盡處天女停梭問人間何事久戲風波顧問同來稺子應爛汝腰下長柯青衫破羣仙笑我千縷挂煙簑又佳人香靉雕盤寒生氷筯畫堂別是風光主人情重開宴出紅妝膩玉圓搓素頸藕絲嫩新織仙裳雙歌罷虛櫩轉月餘韻尚悠颺人間何處有司空見慣應謂尋常坐中有狂客惱亂愁腸報道金釵墜也十指露春笋纖長親曾見全勝宋玉想像賦高唐又或注警悟蝸角虚名蠅頭微利算來著甚乾忙事皆前定誰弱又誰強且趂閒身未老儘放我些子疎狂百年裏渾敎是醉三萬六千場思量能幾許憂愁風雨一半相妨又何須抵死説短論長幸對清風皓月苔茵展雲幙高張江南好千鍾美酒一曲滿庭芳又有王長官者棄官三十三年黄人謂之王先生因送陳慥來過余因賦三十三年今誰存者算只君與長江凜然蒼檜霜榦苦難雙聞道司州古縣雲溪上竹塢松窗江南岸不因送子寧肯過吾邦樅樅疎雨過風林舞破煙葢雲幢願持此邀君一飲空缸居士先生老矣真夢裏相對殘釭歌舞㫁行人未起船鼓已逄逄又余年十七始與劉仲逹往來於眉山今年四十九相逢於泗上洛水淺凍久留郡中晦日同遊南山話舊感歎因作此詞三十三年漂流江海萬里煙浪雲㠶故人驚怪顦顇老青衫我自疎狂異趣君何事奔走塵凡流年盡窮途坐守船尾凍相銜巉巉淮浦外層樓翠壁古寺空嵓歩攜手林間笑挽纖纖莫上孤峯盡處縈望眼雲水相攙家何在因君問我歸歩遶松杉水調歌頭快哉亭作落日繡簾捲亭下水連空知君為我新作窗戸溼青紅長記平山堂上欹枕江南煙雨杳杳沒孤鴻認得醉翁語山色有無中一千頃都鏡淨倒碧峰忽然浪起掀舞一葉白頭翁堪笑蘭臺公子未解莊生天籟剛道有雌雄一點浩然氣千里快哉風又余去歲在東武作水調歌頭以寄子由今年子由相從彭城百餘日過中秋而去作曲以別余以其語過悲乃為和之其意以不早退為戒以退而相從之樂為慰云耳安石在東海從事鬢驚秋中年親友難別絲竹緩離愁一旦功成名遂凖擬東還海道扶病入西州雅志因軒冕遺恨寄滄洲歲云莫須早計要褐裘故鄉歸去千里佳處輙遲留我醉歌時君和醉倒須君扶我惟酒可忘憂一任劉𤣥德相對臥高樓又丙辰中秋歡飲逹旦大醉作此篇兼懐子由明月幾時有把酒問青天不知天上宫闕今夕是何年我欲乘風歸去又恐瓊樓玉宇高處不勝寒起舞弄清影何似在人間轉朱閣低綺戸照無眠不應有恨何事長向別時圓人有悲歡離合月有陰晴圓缺此事古難全但願人長乆千里共嬋娟又歐陽文忠公嘗問余琴詩何者最善畣以退之穎師琴詩最善公曰此詩最竒麗然非聽琴乃聽琵琶也余深然之建安章質夫家善琵琶者乞為歌詞余久不作特取退之詞稍加櫽括使就聲律以遺之昵昵兒女語燈火夜微明恩寃爾汝來去彈指淚和聲忽變軒昻勇士一鼓填然作氣千里不留行囘首莫雲遠飛絮攪青冥衆禽裏真彩鳳獨不鳴躋攀寸歩千險一落百尋輕煩子指間風雨置我腸中氷炭起坐不能平推手從歸去無淚與君傾又子由徐州中秋作離別一何久七度過中秋去年東武今夕明月不勝愁豈意彭城山下同泛清河古汴船上載涼州鼓吹助清賞鴻雁起汀洲坐中客翠羽被紫綺裘素娥無賴西去曾不為人留今夜清尊對客明夜孤㠶水驛依舊照離憂但恐同王粲相對永登樓雨中花慢初至密州以旱蝗齋素者累月方春牡丹盛開不獲一賞至九月忽開千葉一朶雨中為置酒作今歲花時深院盡日東風蕩漾茶煙但有綠苔芳草柳絮榆錢聞道城西長廊古寺甲第名園有國豔帶酒天香染袂為我留連清明過了殘紅無處對此淚灑尊前秋向晩一枝何事向我依然高㑹聊追短景清啇不假餘妍不如留取十分春態付與明年又元刻逸䆳院重簾何處惹得多情愁對風光睡起酒闌花謝蝶亂蜂忙今夜何人吹笙北嶺待月西廂空悵望處一株紅杏斜倚低牆羞顔易變傍人先覺到處被著猜防誰信道㱔兒恩愛無限凄涼好事若無間阻幽歡却是尋常一般滋味就中香美除是偷嘗又元刻逸嫩臉羞蛾因甚化作行雲却返巫陽但有寒燈孤枕皓月空牀長記當初乍諧雲雨便學鸞皇又豈料正好三春桃李一夜風霜丹青畫無言無笑看了謾結愁腸襟袖上猶存殘黛漸減餘香一自醉中忘了奈何酒後思量算應負你枕前珠涙萬㸃千行八聲甘州寄參寥子有情風萬里巻潮來無情送潮歸問錢塘江上西興浦口幾度斜暉不用思量今古俯仰昔人非誰似東坡老白首忘機記取西湖西畔正算山好處空翠煙霏算詩人相得如我與君稀約他年東還海道願謝公雅志莫相違西州路不應囘首為我沾衣醉蓬萊重九上君猷笑勞生一夢羇旅三年又還重九華髮蕭蕭對荒園搔首賴有多情好飲無事似古人賢守歲歲登高年年落帽物華依舊此㑹應須爛醉仍把紫菊茱茰細看重嗅搖落霜風有手栽雙柳來歲今朝為我西顧酹羽觴江口㑹與州人飲公遺愛一江醇酎三部樂情景美人如月乍見掩暮雲更增妍絶算應無恨安用陰晴圓缺嬌甚空只成愁待下床又嬾未語先咽數日不來落盡一庭紅葉今朝置酒強起問為誰減動一分香雪何事散花却病維摩無疾却低眉慘然不畣唱金縷一聲怨切堪折便折且惜取少年花發念奴嬌赤壁懷古大江東去浪淘盡千古風流人物故壘西邊人道是三國周郎赤壁亂石穿空驚濤拍㟁捲起千堆雪江山如畫一時多少豪傑遙想公瑾當年小喬初嫁了雄姿英發羽扇綸巾談笑間強虜灰飛煙滅故國神遊多情應笑我早生華髪人間如夢一尊還酧江月又中秋慿高眺遠見長空萬里雲無留迹桂魄飛來光射處冷浸一天秋碧玉宇瓊樓乘鸞來去人在清涼國江山如畫望中煙樹歷歷我醉拍手狂歌舉盃邀月對影成三客起舞徘徊風露下今夕不知何夕便欲乘風翻然歸去何用騎鵬翼水晶宫裏一聲吹斷横笛水龍吟昔謝自然欲過海求師蓬萊至海中或謂自然蓬萊隔弱水三十萬里不可到天台有司馬子微身居赤城名在絳闕可往從之自然乃還受道於子微白日仙去子㣲著坐忘論七篇樞一篇年百餘將終謂弟子曰吾居玉霄峰東望蓬萊嘗有真靈降焉今為東海青童君所召乃蟬脱而去其後李太白作大鵬賦云嘗見子㣲於江陵謂余有仙風道骨可與神遊八極之表元豐七年冬予過臨淮而湛然先生梁公在焉童顔清徹如二三十許人然人亦有自少見之者善吹鐵笛嘹然有穿雲烈石之聲乃作水龍吟一首記子微太白之事倚其聲而歌之古來雲海茫茫蓬山絳闕知何處人間自有赤城居士龍蟠鳳舉清淨無為坐忘遺照八篇竒語向玉霄東望蓬萊晻靄有雲駕驂風馭行盡九州四海笑紛紛落花飛絮臨江一見謫仙風采無言心許八表神遊浩然相對酒酣箕踞待垂天賦就騎鯨路穩約相將去又嶺南大守閭邱公顯致仕居姑蘇東坡每過必留連嘗言過姑蘇不遊虎邱不謁閭邱乃二欠事其重之如此一日出其後房佐酒有懿卿者甚有才色善吹笛因作水龍吟贈之一云贈趙晦之吹笛侍兒楚山脩竹如雲異材秀出千林表龍鬚半剪鳳膺微漲玉肌勻繞木落淮南雨晴雲夢月明風裊自中郎不見桓伊去後知辜負秋多少聞道嶺南太守後堂深緑珠嬌小綺窗學弄梁州初遍霓裳未了嚼徵含宫泛商流羽一聲雲杪為使君洗盡蠻風瘴雨作霜天曉又次韻章質夫楊花詞似花還似非花也無人惜從教墜抛街傍路思量却是無情有思縈損柔腸困酣嬌眼欲開還閉夢隨風萬里尋郎去處又還被鶯呼起不恨此花飛盡恨西園落紅難綴曉來雨過遺蹤何在一池萍碎春色三分二分塵土一分流水細看來不是楊花點點是離人淚又閭邱大夫孝直公顯嘗守黄州作棲霞樓為郡中勝絶元豐五年予謫居於黄正月十七日夢扁舟渡江中流囘望樓中歌樂雜作舟中人言公顯方㑹客也覺而異之乃作此詞公顯時已致仕在蘇州小舟横截春江臥看翠壁紅樓起雲間笑語使君高㑹佳人半醉危柱哀絃豔歌餘響遶雲縈水念故人老大風流未減獨囘首煙波裏推枕惘然不見但空江月明千里五湖聞道扁舟歸去仍攜西子雲夢南州武昌南㟁昔遊應記料多情夢裏端來見我也參差是又元刻不載小溝東接長江柳堤葦㟁連雲際煙村瀟灑人間一閧漁樵早市永晝端居寸陰虚度了成何事但絲蓴玉藕珠秔錦鯉相留戀又經歲因念浮邱舊侶慣瑤池羽觴沉醉青鸞歌舞銖衣搖曵壺中天地飄墮人間歩虚聲㫁露寒風細抱素琴獨向銀蟾影裏此懐難寄又詠雁元刻不載露寒煙冷蒹葭老天外征鴻寥唳銀河秋晩長門燈悄一聲初至應念瀟湘㟁遙人静水多菰米望極平田徘徊欲下依前被風驚起須信衡陽萬里有誰家錦書遙寄萬里雲外斜行横陣纔疎又綴仙掌月明石頭城下影搖寒水念征衣未搗佳人拂杵有盈盈淚歸朝歡舊刻歸朝歌公嘗有詩與蘇伯固其序曰昔有九江與蘇伯固唱和其略曰我夢扁舟浮震澤雪浪横江千頃白覺來滿眼是廬山倚天無數開青壁葢實夢也然公詩復云扁舟震澤定何時滿眼廬山覺又非我夢扁舟浮震澤雪浪搖空千頃白覺來滿眼是廬山倚天無數開青壁此生長接淅與君同是江南客夢中遊覺來清賞同作飛梭擲明日西風還挂席唱我新詞淚沾臆靈均去後楚山空澧陽蘭芷無顔色君才如夢得武陵更在西南極竹枝詞莫搖新唱誰謂古今隔永遇樂寄孫巨源長憶別時景疎樓下明月如水美酒清歌留連不住月隨人千里別來三度孤光又滿冷落共誰同醉捲珠簾凄然顧影共伊到明無寐今朝有客來從淮上能道使君深意慿仗清淮分明到海中有相思淚而今何在西垣清禁夜永雲華侵被此時看迴廊曉月也應暗記又夜宿燕子樓夢眄眄因作此詞一云徐州夢覺北登燕子樓作明月如霜好風如水清景無限曲港跳魚圓荷瀉露寂莫無人見沈沈三鼓飄然一葉黯黯夢雲驚㫁夜茫茫重尋無覓處覺來小園行遍天涯倦客山中歸路望㫁故園心眼燕子樓空佳人何在空鎖樓中燕古今如夢何曾夢覺但有舊歡新怨異時對南樓夜景為余浩歎又眺望時刻不載天末山横半空簫鼓樓觀高起指點裁成東風滿院總是新桃李綸巾羽扇一尊飲罷目送㫁鴻千里攬清歌餘音不㫁縹緲尚縈流水年來自笑無情何事猶有多情遺思綠鬢朱顔匆匆􅂸了却記花前醉明年春到重尋幽夢應在亂鶯聲裏拍䦨干斜陽轉處有誰共倚無愁可解國士范日新作越調解愁雒陽劉九伯壽聞而悦之戲作俚語之詩天下傳詠以謂幾於逹者龍邱子猶笑之此雖免乎愁猶有所解也者夫遊於自然而託於不得已人樂亦樂人愁亦愁彼且惡乎解哉乃反其詞作無愁可解光景百年看便一世生來不識愁味問愁何處來更開解箇甚底萬事從來風過耳何用不著心裏你喚做展却眉便是逹者也則恐未此理夲不通言何曾道歡遊勝如名利道則渾是錯不道如何即是這裏元無我與你甚喚做物情之外若須待醉了方開解時問無酒怎生醉沁園春孤館燈青野店雞號旅枕夢殘漸月華収練晨霜耿耿雲山摛錦朝露漙漙世路無窮勞生有限似此區區長鮮歡微吟罷凭征鞍無語往事千端當時共客長安似二陸初來俱少年有筆頭千字胷中萬巻致君堯舜此事何難用舍由時行藏在我袖手何妨閒處看身長健但優游卒歲且鬬尊前賀新郎余倅杭日府僚湖中高㑹羣妓畢集惟秀蘭不來營將督之再三乃來僕問其故畣曰沐浴倦臥忽有扣門聲急起詢之乃營將催督也整妝趨命不覺稍遲時府僚有屬意於蘭者見其不來恚恨不已云必有私事秀蘭含淚力辯而僕亦從旁冷語陰為之解府僚終不釋然也適榴花開盛秀蘭以一枝藉手獻座中府僚愈怒責其不恭秀蘭進退無遽但低首垂淚而已僕乃作一曲名賀新郎令秀蘭歌以侑觴聲容妙絶府僚大悦劇飲而罷乳燕飛華屋悄無人桐陰轉午晩涼新浴手弄生綃白團扇扇手一時似玉漸困倚孤眠清熟簾外誰來推繡戸枉教人夢㫁瑤臺曲又却是風敲竹石榴半吐紅巾蹙待浮花浪蕋都盡伴君幽獨穠豔一枝細看取芳心千重似束又恐被秋風驚綠若待得君來向此花前對酒不忍觸共粉淚兩蔌蔌稍遍陶淵明賦歸去來有其詞而無其聲余治東坡築雪堂於上人皆笑其陋獨鄱陽董毅夫過而悦之有卜隣之意乃取歸去來詞稍加􅕍括使就聲律以遺毅夫使家僮歌之時相從於東坡釋耒而和之扣牛角而為之節不亦樂乎為米折腰因酒棄家口體交相累歸去來誰不遣君歸覺從前皆非今是露未晞征夫指予歸路門前笑語喧童稚嗟舊菊都荒新松暗老吾年今已如此但小窗容膝閉柴扉策杖看孤雲暮鴻飛雲出無心鳥倦知還夲非有意噫歸去來兮我今忘我兼忘世親戚無浪語琴書中有真味歩翠麓﨑嶇泛溪窈窕涓涓暗谷流春水觀草木欣榮幽人自感吾生行且休矣念寓形宇内復幾時不自覺皇皇欲何之委吾心去留誰計神仙知在何處富貴非吾願但知臨水登山嘯詠自引壺觴自醉此生天命更何疑且乘流遇坎還止其詞葢世所謂般瞻之稍遍也般瞻龜兹語也華言為五聲葢羽聲也於五音之次為第五今世作般渉誤矣稍遍三疉每疉加促字當為稍讀去聲世作哨或作涉皆非是又春詞睡起畫堂銀蒜押簾珠幙雲垂地初雨歇洗出碧羅天正溶溶養花天氣一霎㬉風迴芳草榮光浮動巻皺銀塘水方杏靨勺酥花鬚吐繡園林翠紅排比見乳燕捎蝶過繁枝忽一綫爐香逐遊絲晝永人間獨立斜陽晩來情味便乗興㩦將佳麗深入芳菲裏撥胡琴語輕攏慢撚總伶俐看𦂳約羅裙急趣檀板霓裳入破驚鴻起顰月臨眉醉霞横臉歌聲悠揚雲際任滿頭紅雨落花飛墜漸鳷鵲樓西玉蟾低尚徘徊未盡歡意君看今古悠悠浮幻人間世這些百歲光陰幾日三萬六千而已醉鄉路穩不妨行但人生要適情耳戚氏此詞詳叙穆天子西王母事世不知所謂遂謂非東坡作李端叔跋云東坡在山中燕席間有歌戚氏調者坐客言調美而詞不典以請于公公方觀山海經卽叙其事為題使妓再歌之隨其聲填寫歌竟篇就纔點定五六字而己玉龜山東皇靈嫓統羣仙絳闕岧嶤翠房深迥倚霏煙幽閒志蕭然金城千里鎖嬋娟當時穆滿巡狩翠華曾到海西邊風露明霽鯨波極目勢浮輿葢方圓正迢迢麗日𤣥圃清寂瓊草芊綿爭解繡勒香韉鸞輅駐蹕八馬戲芝田瑤池近畫樓隱隱翠鳥翩翩肆華筵缺間作管鳴絃宛若帝所鈞天稚頭皓齒綠髮方瞳圓極恬淡高妍盡倒瓊壺酒獻金鼎藥固大椿年縹緲飛瓊妙舞命雙成奏曲醉留連雲璈韻響瀉寒泉浩歌暢飲斜月低河漢漸漸倚霞天際紅深淺動歸思迴兮塵寰爛熳遊玉輦東還杏花風數里響鳴鞭望長安路依稀柳色翠點春妍東坡詞
