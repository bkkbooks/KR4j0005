body:
  text: 東坡詞詞曲類一詞集之屬提要臣等謹案東坡詞一卷宋蘇軾撰軾有易傳諸書别著録宋史藝文志載軾詞一卷馬端臨經籍考則稱東坡詞二卷此本乃毛晉所刻舊有晉跋云得金陵刋本凡附入蘇黃秦栁之作俱經刪去然刋削尚有未盡者如開卷陽關曲三首已載入詩集之中乃餞李公擇絶句其曰以小秦王歌之者乃唐人歌詩之法宋亦失傳惟小秦王調近絶句故借其聲律以歌之非别有詞調謂之陽關曲也使當時有陽關曲一調則必自有本調之宫律何必更借小秦王乎以是收之詞集未免泛濫至集中念奴嬌一首朱彞尊詞綜據容齊隨筆所載黃庭堅手書本改浪淘盡為浪聲沈多情應笑我早生華髮為多情應是笑我生華髮因謂浪淘盡三字于調不協多情句應上四下五然考毛幵此調如算無地閬風頂皆作仄平仄豈可俱謂之未協石孝友此調云九重頻念此衮衣華髮周紫芝此調云白頭應記得尊前傾蓋亦未嘗不作上四下五句晉此刻不取其說仍從舊本則特為有見矣詞自晚唐五代以來以清切婉麗為宗至栁永而一變如詩家之有白居易至軾而又一變如詩家之有韓愈遂開南宋辛棄疾等一派尋源溯流不能不謂之變格然謂之不工則不可故至今日尚與花間一派並行而不能偏廢也乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6b703e38f301de3511fb4f55afc6ee4e2dc85562f9fcb90834af654cd1de6830
